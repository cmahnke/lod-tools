# .github/workflows/wasm-build.yml
name: Build HDT WASM Artifact

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build WASM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout hdt repository
        uses: actions/checkout@v4
        with:
          repository: KonradHoeffner/hdt
          ref: main

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "latest"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-unknown

      - name: Build WASM (web)
        run: wasm-pack build --target web --release --out-dir pkg/web

      - name: Build WASM (bundler)
        run: wasm-pack build --target bundler --release --out-dir pkg/bundler

      - name: Build WASM (nodejs)
        run: wasm-pack build --target nodejs --release --out-dir pkg/nodejs

      - name: Install wasm-opt
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen

      - name: Optimize WASM binaries
        run: |
          for wasm_file in pkg/web/*.wasm pkg/bundler/*.wasm pkg/nodejs/*.wasm; do
            if [ -f "$wasm_file" ]; then
              wasm-opt -Oz "$wasm_file" -o "$wasm_file.opt"
              mv "$wasm_file.opt" "$wasm_file"
              echo "Optimized: $wasm_file ($(stat -c%s "$wasm_file") bytes)"
            fi
          done

      - name: List artifacts
        run: |
          echo "=== web ===" && ls -lh pkg/web/
          echo "=== bundler ===" && ls -lh pkg/bundler/
          echo "=== nodejs ===" && ls -lh pkg/nodejs/

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: hdt-wasm-web
          path: pkg/web/
          retention-days: 30

      - name: Upload bundler artifact
        uses: actions/upload-artifact@v4
        with:
          name: hdt-wasm-bundler
          path: pkg/bundler/
          retention-days: 30

      - name: Upload nodejs artifact
        uses: actions/upload-artifact@v4
        with:
          name: hdt-wasm-nodejs
          path: pkg/nodejs/
          retention-days: 30

  publish:
    name: Publish to GitHub Packages
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download bundler artifact
        uses: actions/download-artifact@v4
        with:
          name: hdt-wasm-bundler
          path: pkg/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@cmahnke"

      - name: Prepare package for GitHub Packages
        run: |
          cd pkg
          jq '. + {
            name: "@cmahnke/hdt",
            repository: {
              type: "git",
              url: "https://github.com/KonradHoeffner/hdt.git"
            },
            publishConfig: {
              registry: "https://npm.pkg.github.com"
            }
          }' package.json > package.json.tmp && mv package.json.tmp package.json
          echo "=== package.json ==="
          cat package.json

      - name: Delete existing package version
        uses: actions/delete-package-versions@v5
        with:
          package-name: "hdt"
          package-type: "npm"
          owner: "cmahnke"
          min-versions-to-keep: 0
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Publish
        run: |
          cd pkg
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Create GitHub Release with Tarball
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      contents: write

    steps:
      - name: Checkout (für git tag Operationen)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create tarballs
        run: |
          mkdir -p release
          tar czf release/hdt-web.tar.gz -C artifacts/hdt-web .
          tar czf release/hdt-bundler.tar.gz -C artifacts/hdt-bundler .
          tar czf release/hdt-nodejs.tar.gz -C artifacts/hdt-nodejs .

          cd artifacts/hdt-bundler
          npm pack
          mv *.tgz ../../release/cmahnke-hdt.tgz
          cd ../..

          echo "=== Release files ==="
          ls -lh release/

      - name: Read version
        id: meta
        run: |
          VERSION=$(jq -r '.version' artifacts/hdt-bundler/package.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Delete existing 'latest' release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

      - name: Create 'latest' tag
        run: |
          git tag -f latest
          git push -f origin latest

      - name: Create 'latest' release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            release/cmahnke-hdt.tgz \
            release/hdt-web.tar.gz \
            release/hdt-bundler.tar.gz \
            release/hdt-nodejs.tar.gz \
            --title "Latest Build (v${{ steps.meta.outputs.version }})" \
            --notes "**Automatischer Build vom \`${{ github.sha }}\`**

          ### Installation ohne Login

          \`\`\`bash
          npm i https://github.com/${{ github.repository }}/releases/download/latest/cmahnke-hdt.tgz
          \`\`\`

          | Datei | Target |
          |-------|--------|
          | cmahnke-hdt.tgz | npm install (bundler) |
          | hdt-web.tar.gz | script type=module |
          | hdt-bundler.tar.gz | Vite/Webpack |
          | hdt-nodejs.tar.gz | Node.js |" \
            --latest
