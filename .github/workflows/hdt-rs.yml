# .github/workflows/wasm-build.yml
name: Build HDT WASM Artifact

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build WASM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout hdt repository
        uses: actions/checkout@v4
        with:
          repository: KonradHoeffner/hdt
          ref: main

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "latest"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-unknown

      - name: Build WASM (web)
        run: wasm-pack build --target web --release --out-dir pkg/web

      - name: Build WASM (bundler)
        run: wasm-pack build --target bundler --release --out-dir pkg/bundler

      - name: Build WASM (nodejs)
        run: wasm-pack build --target nodejs --release --out-dir pkg/nodejs

      - name: Install wasm-opt
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen

      - name: Optimize WASM binaries
        run: |
          for wasm_file in pkg/web/*.wasm pkg/bundler/*.wasm pkg/nodejs/*.wasm; do
            if [ -f "$wasm_file" ]; then
              wasm-opt -Oz "$wasm_file" -o "$wasm_file.opt"
              mv "$wasm_file.opt" "$wasm_file"
              echo "Optimized: $wasm_file ($(stat -c%s "$wasm_file") bytes)"
            fi
          done

      - name: List artifacts
        run: |
          echo "=== web ===" && ls -lh pkg/web/
          echo "=== bundler ===" && ls -lh pkg/bundler/
          echo "=== nodejs ===" && ls -lh pkg/nodejs/

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: hdt-wasm-web
          path: pkg/web/
          retention-days: 30

      - name: Upload bundler artifact
        uses: actions/upload-artifact@v4
        with:
          name: hdt-wasm-bundler
          path: pkg/bundler/
          retention-days: 30

      - name: Upload nodejs artifact
        uses: actions/upload-artifact@v4
        with:
          name: hdt-wasm-nodejs
          path: pkg/nodejs/
          retention-days: 30

  publish:
    name: Publish to GitHub Packages
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download bundler artifact
        uses: actions/download-artifact@v4
        with:
          name: hdt-wasm-bundler
          path: pkg/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@konradhoeffner"

      - name: Prepare package for GitHub Packages
        run: |
          cd pkg
          jq '. + {
            name: "@projektemacher/hdt-wasm",
            repository: {
              type: "git",
              url: "https://github.com/KonradHoeffner/hdt.git"
            },
            publishConfig: {
              registry: "https://npm.pkg.github.com"
            }
          }' package.json > package.json.tmp && mv package.json.tmp package.json
          echo "=== package.json ==="
          cat package.json

      - name: Setup local repository
        run: |
          echo registry=https://npm.pkg.github.com/ > .npmrc
          echo always-auth=true >> .npmrc
          echo '//npm.pkg.github.com/cmahnke:_authToken=${{ secrets.GITHUB_TOKEN }} @cmahnke:registry=https://npm.pkg.github.com/cmahnke' >> .npmrc

      - name: Publish
        run: |
          cd pkg
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
